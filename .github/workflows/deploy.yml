name: Deploy to Digital Ocean

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vue-tvbingo/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build (frontend embedded in backend JAR)
        run: ./gradlew buildUnifiedJar

      - name: Diagnose SSH connection
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "=== Secret presence check ==="
          echo "DO_HOST set: ${{ secrets.DO_HOST != '' }}"
          echo "DO_USER set: ${{ secrets.DO_USER != '' }}"
          echo "DO_SSH_KEY set: ${{ secrets.DO_SSH_KEY != '' }}"
          echo "Key character count: ${#SSH_KEY}"

          echo "=== Write key and check format ==="
          echo "$SSH_KEY" > /tmp/diag_key
          chmod 600 /tmp/diag_key
          head -1 /tmp/diag_key   # shows only the header line e.g. -----BEGIN OPENSSH PRIVATE KEY-----
          tail -1 /tmp/diag_key   # shows footer
          wc -l /tmp/diag_key     # should be >3 lines; 1 line = newlines were stripped
          ssh-keygen -l -f /tmp/diag_key && echo "Key format: VALID" || echo "Key format: INVALID"

          echo "=== Verbose SSH test (first 60 lines) ==="
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -i /tmp/diag_key \
            "${DO_USER}@${DO_HOST}" "echo SSH_OK" 2>&1 | head -60 || true

          rm -f /tmp/diag_key

      - name: Copy JAR to droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "spring-tvbingo/build/libs/*.jar"
          target: "/opt/tvbingo/deploy/"
          strip_components: 3

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            JAR=$(ls -t /opt/tvbingo/deploy/*.jar | grep -v plain | head -1)
            cp "$JAR" /opt/tvbingo/tv-bingo-app.jar
            rm -f /opt/tvbingo/deploy/*.jar
            sudo systemctl restart tvbingo
            sleep 8
            sudo systemctl is-active tvbingo
            echo "Deploy successful"
