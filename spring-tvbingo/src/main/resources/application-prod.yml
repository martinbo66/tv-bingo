spring:
  datasource:
    # Database connection via environment variables
    # For Supabase: set TVBINGO_DB_URL to pooler URL, TVBINGO_DB_USERNAME to pooler username
    # For local/KinD: set to local PostgreSQL connection details
    url: ${TVBINGO_DB_URL}
    username: ${TVBINGO_DB_USERNAME}
    password: ${TVBINGO_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  # Running behind nginx: honor X-Forwarded-* headers so Spring sees the real
  # public scheme/host. This lets CORS correctly detect same-origin requests
  # from the SPA and avoid spurious 403 "Invalid CORS request" responses.
  forward-headers-strategy: framework

# Origins allowed to call /api/** (comma-separated origin patterns).
# Override via TVBINGO_CORS_ALLOWED_ORIGINS if the frontend is served elsewhere.
tvbingo:
  cors:
    allowed-origins: ${TVBINGO_CORS_ALLOWED_ORIGINS:https://groupfunbingo.com,https://www.groupfunbingo.com}
